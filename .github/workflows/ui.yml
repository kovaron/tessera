name: ui

on:
  push:
    paths: ["ui/**", "internal/audit/**", "cmd/tessera/**", ".github/workflows/ui.yml"]
  pull_request:
    paths: ["ui/**", "internal/audit/**", "cmd/tessera/**", ".github/workflows/ui.yml"]

jobs:
  test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.22" }
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - uses: pnpm/action-setup@v3
        with: { version: 9 }
      - uses: dtolnay/rust-toolchain@stable

      - name: Go tests
        run: go test ./... -race -count=1

      - name: pnpm install
        working-directory: ui
        run: pnpm install --frozen-lockfile=false

      - name: Frontend tests
        working-directory: ui
        run: pnpm test

      - name: Rust tests
        working-directory: ui/src-tauri
        run: cargo test

      - name: Build sidecar
        run: make sidecar

      - name: Tauri build (debug, no bundle)
        working-directory: ui
        run: pnpm tauri build --debug --no-bundle
