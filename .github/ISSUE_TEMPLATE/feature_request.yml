name: Feature request
description: Propose a new capability or improvement.
title: "[feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do that Tessera does not let you do today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: A short description of the change. Sketches, schema notes, API shape welcome.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds you tried, related tools, prior approaches.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, references, anything else.
