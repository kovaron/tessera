name: Bug report
description: Something is broken. Not a security issue (see SECURITY.md for those).
title: "[bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Please fill in as much as you can.
        **Do not file security vulnerabilities here.** Email per `SECURITY.md`.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A short description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. tessera-cli bootstrap
        2. ./tessera &
        3. curl ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected vs actual behaviour
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `tessera --version` (or commit SHA).
      placeholder: v0.1.1
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS and architecture
      placeholder: macOS 15.0 / arm64
    validations:
      required: true
  - type: textarea
    id: audit
    attributes:
      label: Relevant audit log
      description: Events from `~/.tessera/audit.log` around the failure. Redact real secrets.
      render: json
  - type: checkboxes
    id: terms
    attributes:
      label: Confirmations
      options:
        - label: This is not a security vulnerability.
          required: true
        - label: I have removed any real secrets, tokens, or credentials from this report.
          required: true
