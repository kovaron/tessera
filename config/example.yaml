server:
  listen: "127.0.0.1:8080"
  admin_socket: "/var/run/ai-secrets-manager/admin.sock"

store:
  driver: sqlite
  path: "/var/lib/ai-secrets-manager/secrets.db"

secrets:
  default_ttl: 15m
  body_preview_limit: 512
  providers:
    - name: env
      prefix: "env://"
    - name: 1password
      prefix: "op://"
      vault: "AI Secrets Manager"
      service_account_token_env: OP_SERVICE_ACCOUNT_TOKEN
    - name: doppler
      prefix: "doppler://"
      project: ai-secrets-manager
      config: production
      token_env: DOPPLER_TOKEN

audit:
  format: json
  destination: stdout

upstreams:
  - id: github
    base_url: "https://api.github.com"
    inject:
      type: bearer
      secret_ref: "op://AI Secrets Manager/github-pat/token"

  - id: openai
    base_url: "https://api.openai.com"
    inject:
      type: bearer
      secret_ref: "doppler://openai-api-key"
